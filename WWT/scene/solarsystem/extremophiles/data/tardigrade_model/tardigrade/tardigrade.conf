mesh
{

	cullRadius 2

  data  tardiMesh ./modules/tardigrade/model/tardigrade.x
  
  	glslVersion 330 	
	
	enableTypeCheck true

  animation
	{

		tardiMesh
		{		
			seq
			{	
				seqNo 0		#run
				playFrom 0				
				playTill 1800
				timeStep 60
			}
		}
	}
  
	pass
	{
		useDataObject tardiMesh
		shader
		{
			type defaultMeshShader
			{			
				vertexShader ./data/shaders/meshShader.vs
                fragmentShader ./data/shaders/meshshader.fs			
				define UV_DIFFUSE_TEXTURE
				parameter1f uv_diffuseTexStrength 0.3
				define UV_AMBIENT_TEXTURE
				parameter1f uv_ambientTexStrength 0.3
				parameter1i uv_ambientTexOp 0
				
				define UV_EMISSIVE_TEXTURE
				parameter1f uv_emissiveTexStrength 0.8
			
			}
			
			
		}
			


		}	
	}

}
